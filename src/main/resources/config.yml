plugin:
  debug: true
  default-provider: auto
  default-mode: build
  chat-trigger-prefix: "hey"

validation:
  require-full-footprint-clear: true
  live-protection-recheck: true
  allow-auto-relocate: true
  collision-padding: 1
  max-auto-relocate-distance: 16

hooks:
  worldguard:
    enabled: true
    allowed-build-regions: []
    preserve-regions: []
  griefprevention:
    enabled: true
  calickronpcbridge:
    enabled: true

site-planner:
  search-min-distance: 0
  search-max-distance: 48
  lateral-step: 2
  max-side-offset: 24
  preserve-world-spawn-radius: 8
  min-house-gap: 1
  road-preference-distance: 12
  road-clearance: 0
  avoid-ground-materials:
    - DIRT_PATH
    - OAK_SLAB
    - SPRUCE_SLAB

build:
  blocks-per-tick: 25
  blocks-per-step: 1
  interval-ticks: 8
  max-jobs-per-builder: 1
  default-foundation-depth: 2
  default-path-material: DIRT_PATH
  preview-enabled: true

# Build speed profiles.
# mode:
#   smart      = recommended default. Speeds up bulk sections and slows down detail finishing.
#   fixed      = always uses fixed-ticks-per-step.
#   cinematic  = slower, more immersive pacing for players watching the builder work.
#   fast       = very quick pacing for testing. Large builds may lag slower servers.
#   custom     = uses the values from the custom preset below.
build-speed:
  mode: smart

  # Only used when mode = fixed.
  # Lower = faster, higher = slower.
  fixed-ticks-per-step: 8

  presets:
    cinematic:
      # Slow and immersive building.
      base-ticks-per-step: 20
      detail-multiplier: 1.5
      bulk-multiplier: 1.0

    smart:
      # Recommended default. Faster on large plain sections, slower near the end/detail pass.
      base-ticks-per-step: 10
      detail-multiplier: 1.4
      bulk-multiplier: 0.7

    fast:
      # Fast testing mode. Warning: large builds may lag the server if used too aggressively.
      base-ticks-per-step: 2
      detail-multiplier: 1.0
      bulk-multiplier: 0.5

    custom:
      # Fully adjustable mode for server owners who want their own pacing.
      base-ticks-per-step: 6
      detail-multiplier: 1.2
      bulk-multiplier: 0.8

messages:
  prefix: "&6[CalickroBuilder]&r "
  no-builder-selected: "No builder NPC is currently selected or bound."
  build-blocked: "I can't build there because the target area is protected or invalid."
  build-queued: "Build job queued successfully."
  provider-not-ready: "That NPC provider is not ready yet."
