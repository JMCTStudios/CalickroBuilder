plugin:
  debug: true
  default-provider: auto
  default-mode: build
  chat-trigger-prefix: "hey"

validation:
  require-full-footprint-clear: true
  live-protection-recheck: true
  allow-auto-relocate: true
  collision-padding: 1
  max-auto-relocate-distance: 16

hooks:
  worldguard:
    enabled: true
  griefprevention:
    enabled: true
  calickronpcbridge:
    enabled: true


site-planner:
  search-min-distance: 10
  search-max-distance: 28
  lateral-step: 2
  max-side-offset: 16
  preserve-world-spawn-radius: 8
  avoid-ground-materials:
    - DIRT_PATH
    - GRASS_PATH
    - OAK_SLAB
    - SPRUCE_SLAB

build:
  blocks-per-tick: 25
  blocks-per-step: 1
  interval-ticks: 8
  max-jobs-per-builder: 1
  default-foundation-depth: 2
  default-path-material: DIRT_PATH
  preview-enabled: true

messages:
  prefix: "&6[CalickroBuilder]&r "
  no-builder-selected: "No builder NPC is currently selected or bound."
  build-blocked: "I can't build there because the target area is protected or invalid."
  build-queued: "Build job queued successfully."
  provider-not-ready: "That NPC provider is not ready yet."
