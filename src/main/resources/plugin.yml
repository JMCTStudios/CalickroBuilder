name: CalickroBuilder
version: 0.1.0-SNAPSHOT
main: net.calickrosmp.builder.CalickroBuilderPlugin
api-version: '1.21'
authors:
  - Calickro
  - MeNDeZxOG
description: AI builder NPC system for CalickroSMP
softdepend:
  - Citizens
  - FancyNpcs
  - WorldGuard
  - GriefPrevention
  - CalickroNPCBridge
commands:
  cali:
    description: Main CalickroBuilder command
    usage: /cali builder
permissions:
  calickrobuilder.admin:
    description: Full access to CalickroBuilder
    default: op
  calickrobuilder.use:
    description: Basic builder use permission
    default: true
  calickrobuilder.speed:
    description: Lets admins change builder speed at runtime
    default: op
  calickrobuilder.bypass.preserve:
    description: Lets the builder ignore preserved spawn-center or preserve-region checks
    default: op
  calickrobuilder.bypass.worldguard:
    description: Lets the builder ignore allowed WorldGuard build-region checks
    default: op
  calickrobuilder.bypass.all:
    description: Full builder bypass for advanced checks
    default: op
